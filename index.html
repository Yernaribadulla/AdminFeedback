<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Штиль · Дашборд команды</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <header class="dash-header">
    <div class="brand">
      <span class="brand-eyebrow">Кофейня «Штиль» · Актау</span>
      <h1 class="brand-title">Дашборд команды</h1>
    </div>

    <div class="header-stats">
      <div class="stat-widget">
        <span class="stat-value" id="stat-total-reviews">—</span>
        <span class="stat-label" id="stat-total-label">Всего отзывов</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-widget">
        <span class="stat-value" id="stat-avg-rating">—</span>
        <span class="stat-label" id="stat-avg-label">Средний балл</span>
      </div>
    </div>
  </header>

  <!-- Executive Snapshot ыыыыыыы -->
  <section class="snapshot-panel" id="snapshot-panel">
    <div class="snapshot-card" id="snapshot-negative-today"
         data-tooltip="Количество отзывов с оценкой 3 звезды и ниже за текущие сутки">
      <span class="snapshot-icon">🔴</span>
      <div class="snapshot-text">
        <span class="snapshot-title" id="snapshot-negative-title">—</span>
        <span class="snapshot-caption">за сегодня</span>
      </div>
    </div>

    <div class="snapshot-card"
         data-tooltip="Средний балл сервиса кофейни строго за последние 7 дней">
      <span class="snapshot-icon">⭐</span>
      <div class="snapshot-text">
        <span class="snapshot-title" id="snapshot-week-rating">—</span>
        <span class="snapshot-caption">рейтинг за неделю</span>
      </div>
    </div>

    <div class="snapshot-card"
         data-tooltip="Бариста с наивысшим средним баллом и наибольшим числом отзывов за эту неделю">
      <span class="snapshot-icon">🏆</span>
      <div class="snapshot-text">
        <span class="snapshot-title" id="snapshot-week-leader">—</span>
        <span class="snapshot-caption">лидер недели</span>
      </div>
    </div>

    <div class="snapshot-card" id="snapshot-trend"
         data-tooltip="Показывает сотрудника, чей рейтинг просел сильнее всего по сравнению с прошлой неделей">
      <span class="snapshot-icon" id="snapshot-trend-icon">✅</span>
      <div class="snapshot-text">
        <span class="snapshot-title" id="snapshot-trend-title">—</span>
        <span class="snapshot-caption">тренд по команде</span>
      </div>
    </div>

    <div class="snapshot-card"
         data-tooltip="Соотношение оставленных отзывов к числу сканов QR-кода">
      <span class="snapshot-icon">📈</span>
      <div class="snapshot-text">
        <span class="snapshot-title" id="snapshot-conversion">—</span>
        <span class="snapshot-caption">конверсия QR</span>
      </div>
    </div>
  </section>

  <section class="best-employee" id="best-employee">
    <div class="best-employee-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <path d="M8 4h8v3a4 4 0 0 1-4 4 4 4 0 0 1-4-4V4z"/>
        <path d="M8 5H5a3 3 0 0 0 3 5"/>
        <path d="M16 5h3a3 3 0 0 1-3 5"/>
        <path d="M12 11v3"/>
        <path d="M9 20h6"/>
        <path d="M10 17h4v3h-4z"/>
      </svg>
    </div>
    <div class="best-employee-info">
      <span class="best-employee-label">Лучший сотрудник</span>
      <h2 class="best-employee-name" id="best-name">—</h2>
      <span class="best-employee-score" id="best-score">—</span>
    </div>
    <div class="month-select-wrap">
      <label class="month-select-label" for="month-select">Период</label>
      <select class="month-select" id="month-select">
        <option value="all">Все время</option>
      </select>
    </div>
  </section>

  <section class="team-section">
    <div class="team-section-header">
      <h3 class="section-title">Команда</h3>
      <div class="filter-controls">
        <button type="button" class="filter-btn is-disabled" id="reset-filter-btn">
          Все сотрудники
        </button>
        <button type="button" class="filter-btn warning-btn" id="negative-filter-btn">
          <svg viewBox="0 0 24 24" class="warning-icon">
            <path d="M12 3.5L21 19H3z"/>
            <path d="M12 9.5v4.2"/>
            <circle cx="12" cy="16.6" r="0.6" fill="currentColor" stroke="none"/>
          </svg>
          Негативные отзывы
        </button>
      </div>
    </div>
    <div class="team-grid" id="team-grid">
      <div class="state-placeholder">Загрузка данных команды…</div>
    </div>
  </section>

  <section class="reviews-section">
    <h3 class="section-title" id="reviews-title">Последние отзывы</h3>
    <div class="reviews-feed" id="reviews-feed">
      <div class="state-placeholder">Загрузка отзывов…</div>
    </div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
